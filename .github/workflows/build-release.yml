name: Build and Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

env:
  PACKAGE_NAME: luci-app-xray
  CACHE_DIR: ~/cache

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            sdk_url_path: https://downloads.openwrt.org/releases/25.12.1/targets/x86/64
            sdk_name: -sdk-25.12.1-x86-64_

          - arch: mipsel
            sdk_url_path: https://downloads.openwrt.org/releases/25.12.1/targets/ramips/mt7621
            sdk_name: -sdk-25.12.1-ramips-mt7621_

    env:
      SDK_URL_PATH: ${{ matrix.sdk_url_path }}
      SDK_NAME: ${{ matrix.sdk_name }}
      CCACHE_DIR: ~/.ccache
      CONFIG_CCACHE: y

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Cache Key
        id: cache_key
        run: echo "timestamp=$(date +"%s")" >> $GITHUB_OUTPUT

      - name: Setup Cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CACHE_DIR }}
            ${{ env.CCACHE_DIR }}
          key: openwrt-${{ matrix.arch }}-${{ env.PACKAGE_NAME }}-${{ steps.cache_key.outputs.timestamp }}
          restore-keys: |
            openwrt-${{ matrix.arch }}-${{ env.PACKAGE_NAME }}-

      - name: Install Dependencies
        run: |
          DEBIAN_FRONTEND=noninteractive sudo apt-get update
          sudo apt-get install -y ccache gettext libncurses5-dev xsltproc p7zip-full zstd

      - name: Create Directories
        run: |
          CACHE_DIR_SDK="$CACHE_DIR/sdk"
          CACHE_DIR_DL="$CACHE_DIR/dl"
          CACHE_DIR_FEEDS="$CACHE_DIR/feeds"
          mkdir -p "$CACHE_DIR_SDK" "$CACHE_DIR_DL" "$CACHE_DIR_FEEDS"
          echo "CACHE_DIR_SDK=$CACHE_DIR_SDK" >> $GITHUB_ENV
          echo "CACHE_DIR_DL=$CACHE_DIR_DL" >> $GITHUB_ENV
          echo "CACHE_DIR_FEEDS=$CACHE_DIR_FEEDS" >> $GITHUB_ENV
          echo "SDK_HOME=$(mktemp -d)" >> $GITHUB_ENV

      - name: Download and Unzip SDK
        run: |
          cd "$CACHE_DIR_SDK"
          wget -q -O - "$SDK_URL_PATH/sha256sums" | grep -- "$SDK_NAME" > sha256sums.small
          SDK_FILE=$(cat sha256sums.small | awk '{print $2}' | sed 's/*//g')
          sha256sum -c sha256sums.small >/dev/null 2>&1 || wget -q -O "$SDK_FILE" "$SDK_URL_PATH/$SDK_FILE"
          cd -

          # 支持 zst 解压
          zstd -cd "$CACHE_DIR_SDK/$SDK_FILE" | tar -C "$SDK_HOME" -xvf - --strip=1

          cd "$SDK_HOME"
          rm -rf dl feeds
          ln -s "$CACHE_DIR_DL" dl
          ln -s "$CACHE_DIR_FEEDS" feeds
          cp feeds.conf.default feeds.conf
          sed -i 's#git.openwrt.org/openwrt/openwrt#github.com/openwrt/openwrt#' feeds.conf
          sed -i 's#git.openwrt.org/feed/packages#github.com/openwrt/packages#' feeds.conf
          sed -i 's#git.openwrt.org/project/luci#github.com/openwrt/luci#' feeds.conf
          sed -i 's#git.openwrt.org/feed/telephony#github.com/openwrt/telephony#' feeds.conf
          cd -

      - name: Update feeds and link package
        run: |
          cd "$SDK_HOME"
          ./scripts/feeds update -a
          ln -s "${{ github.workspace }}" "package/$PACKAGE_NAME"
          ./scripts/feeds install -a

      - name: Build Package
        run: |
          cd "$SDK_HOME"
          make defconfig
          make package/$PACKAGE_NAME/clean
          make package/$PACKAGE_NAME/compile V=s

      - name: Upload built ipk
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.arch }}
          path: ${{ env.SDK_HOME }}/bin/packages/*/*/*.ipk

  release:
    name: Create Release & Upload All
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all ipks
        uses: actions/download-artifact@v4
        with:
          pattern: ipk-*
          merge-multiple: true
          path: ./output

      - name: List files
        run: ls -lh ./output

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./output/*.ipk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify Release Publish
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Notify external service
        run: |
          if [ -n "${{ secrets.TRIGGER_URL }}" ]; then
            curl -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.TRIGGER_TOKEN }}" \
              -d '{"event":"release","repository":"${{ github.repository }}","ref":"${{ github.ref }}"}' \
              "${{ secrets.TRIGGER_URL }}"
          fi
